project_id = "gone-app"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "exp://localhost:8081"
additional_redirect_urls = ["gone://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions]

[functions.challenge-generator]
verify_jwt = false

[functions.midnight-ceremony]
verify_jwt = false

[functions.send-notifications]
verify_jwt = false

[functions.get-upload-url]
verify_jwt = true
