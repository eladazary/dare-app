name: Generate Pending Traces

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check pool and generate pending traces
        env:
          GOOGLE_MAPS_KEY:      ${{ secrets.GOOGLE_MAPS_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 scripts/streetview-traces.py \
            --pending \
            --count=50 \
            --min-pool=200

      - name: Activate pending traces + rotate expired
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - <<'EOF'
          import os, subprocess, json

          KEY = os.environ["SUPABASE_SERVICE_KEY"]
          URL = "https://plecaiybtebebbhoabkw.supabase.co"

          for fn in ["rotate_expired_traces", "refresh_cooldown_traces"]:
              r = subprocess.run(
                  ["curl", "-s", "-X", "POST", f"{URL}/rest/v1/rpc/{fn}",
                   "-H", f"apikey: {KEY}", "-H", f"Authorization: Bearer {KEY}",
                   "-H", "Content-Type: application/json"],
                  capture_output=True, text=True)
              print(f"{fn}: {r.stdout.strip()}")

          # Activate pending to keep 80 traces active
          r = subprocess.run(
              ["curl", "-s", "-X", "POST", f"{URL}/rest/v1/rpc/activate_pending_traces",
               "-H", f"apikey: {KEY}", "-H", f"Authorization: Bearer {KEY}",
               "-H", "Content-Type: application/json",
               "-d", json.dumps({"target_active": 80})],
              capture_output=True, text=True)
          print(f"activate_pending_traces: {r.stdout.strip()}")
          EOF
